# Default values for linkurious-enterprise.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

image:
  # -- Repository to use for the application.
  # You will need to retrieve the image from the Linkurious Customer Center and load it into your private repository
  repository: ""
  # -- Image pull policy for Linkurious server, can be one of Always, IfNotPresent, Never
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- Secrets with credentials to pull images from a private registry.
# Secrets must be manually created in the namespace.
# ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: false
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000
  runAsNonRoot: true
  runAsUser: 2013
  seccompProfile:
    type: RuntimeDefault

securityContext:
  # readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

## Readiness and liveness probes for default backend
## Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/
##
readinessProbe:
  # -- Enable Kubernetes readiness probe for server
  enabled: true
  # -- Http path for the readiness probe (templated)
  path: /api/status/
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 1
livenessProbe:
  # -- Enable Kubernetes liveness probe for server
  enabled: true
  # -- Http path for the liveness probe (templated)
  path: /api/status/
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 1

# -- Environment variables to pass to Linkurious server
env: []
  # - name: "LKE_AUTH_REQUIRED"
  #   value: "true"

# -- envFrom to pass to Linkurious server
envFrom: []
  # - configMapRef:
  #     name: config-map-name
  # - secretRef:
  #     name: secret-name

# -- Existing secret to use for license
# licenseFromSecret: '{{ printf "%s-lke-license-secret" .Release.Name }}'

service:
  type: ClusterIP
  port: 80
  metricsPort: 9400
  annotations: {}

## -- hostPostfix is used to generate hosts and urls using the target namespace.
hostPostfix: example.domain
hostPrefixOverride: linkurious-enterprise

# Linkurious Enterprise server ingress configuration
ingress:
  # -- Enable an ingress resource for the Linkurious Enterprise server
  enabled: false
  # -- Defines which ingress controller will implement the resource
  className: ""
  # -- Additional ingress labels
  labels: {}
    # kube-prometheus-stack-probe: enabled
  # -- Additional ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - paths:
        - path: /
          pathType: ImplementationSpecific
   # - host: chart-example.local
   #   paths:
   #     - path: /
   #       pathType: ImplementationSpecific
  tls:
    - secretName: wildcard-default-cert
    # - secretName: wildcard-default-cert
    #  hosts:
    #    - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 1000m
  #   memory: 600Mi
  # requests:
  #   cpu: 500m
  #   memory: 300Mi

## -- Create HorizontalPodAutoscaler object for deployment type
# This is not currently recommended
# https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
autoscaling:
  # -- Enable Horizontal Pod Autoscaler ([HPA]) for Linkurious server (not recommended)
  enabled: false
  # -- Minimum number of replicas for Linkurious server [HPA]
  minReplicas: 1
  # -- Maximum number of replicas for Linkurious server [HPA]
  maxReplicas: 2
  # -- Average CPU utilization percentage for Linkurious server [HPA]
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
## Use init containers to configure custom tooling
## https://argoproj.github.io/argo-cd/operator-manual/custom_tools/
## When using the volumes & volumeMounts section bellow, please comment out those above.
#  volumes:
#  - name: custom-tools
#    emptyDir: {}
#
#  initContainers:
#  - name: download-tools
#    image: alpine:3.8
#    command: [sh, -c]
#    args:
#      - wget -qO- https://get.helm.sh/helm-v2.16.1-linux-amd64.tar.gz | tar -xvzf - &&
#        mv linux-amd64/helm /custom-tools/
#    volumeMounts:
#      - mountPath: /custom-tools
#        name: custom-tools
#  volumeMounts:
#  - mountPath: /usr/local/bin/helm
#    name: custom-tools
#    subPath: helm

# -- Manage LKE configmap (Declarative Setup)
## Ref: https://doc.linkurio.us/admin-manual/latest/configure/#variable-expansion
configOverlayEnabled: true
# -- Linkurious Enterprise configuration overlay.
# Values here are rendered into a ConfigMap mounted as overlay.json.
# Supports $ENV:VAR_NAME (string) and $ENV-JSON:VAR_NAME (JSON boolean) variable expansion at runtime.
# Ref: https://doc.linkurio.us/admin-manual/latest/configure/
config:
  version: '{{ .Chart.AppVersion }}'
  server:
    cookieHttpOnly: true
    allowFraming: false
    useHttps: false
    forceHttps: false
  ## -- Uncomment and configure for SSO / OAuth2:
  # access:
  #   authRequired: true
  #   oauth2:
  #     enabled: true
  #     provider: "azure"
  #     authorizationURL: "https://login.microsoftonline.com/<tenant>/oauth2/v2.0/authorize"
  #     tokenURL: "https://login.microsoftonline.com/<tenant>/oauth2/v2.0/token"
  #     clientID: "<your-client-id>"
  #     clientSecret: "<your-client-secret>"
  #     azure:
  #       tenantID: "<your-tenant-id>"
  ## -- Uncomment and configure server domain/origin (required behind ingress):
  # server:
  #   domain: "lke.example.com"
  #   publicPortHttps: 443
  #   forcePublicHttps: true
  #   allowOrigin: "https://lke.example.com"
  ## -- Uncomment to set the externally facing base URL (required for SSO):
  # url: https://lke.example.com

plugins:
  enabled: true

# -- set offlineMaintenanceModeEnabled: true to restart the StatefulSet without the linkurious-enterprise process running
# this can be used to perform tasks that cannot be performed when Neo4j is running,
# or in case the configuration is broken
offlineMaintenanceModeEnabled: false

persistentVolume:
  # -- Enable persistent volume for Linkurious server
  enabled: false
  ## linkurious server data Persistent Volume Storage Class
  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  # storageClass: "-"
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  annotations: {}

backup:

  litestream:
    ## -- Enable backup for Linkurious server running sqlite with litestream
    enabled: false
    image: litestream/litestream:0.3.13
    readinessProbe:
      exec:
        command:
          - litestream
          - snapshots
          - /data/server/database.sqlite
      initialDelaySeconds: 5
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 10
    livenessProbe:
      exec:
        command:
          - litestream
          - snapshots
          - /data/server/database.sqlite
      initialDelaySeconds: 5
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 10
    resources:
      limits:
        cpu: 1500m
        memory: 1000Mi
      requests:
        cpu: 100m
        memory: 100Mi
    secretRef:
      name: "litestream-lke-secret"
    config: |
      ---
      # https://litestream.io/reference/config/
      dbs:
        - path: /data/server/database.sqlite
          replicas:
            - url: s3://BUCKETNAME/PATHNAME
              retention: 720h
              snapshot-interval: 24h

  velero:
    ## -- Enable backup for Linkurious server lke-data volume with velero
    name: velero
    instance: velero-preprod
    veleroNamespace: backup
    includedResources:
      - pvc
      - pv
    #excludedResources:
    #  - secrets
    labels:
      app.kubernetes.io/name: linkurious-enterprise
    skipImmediately: false
    labelsSelector:
      # backup.velero.io/backup-volumes: lke-data
      app.kubernetes.io/name: linkurious-enterprise
    primaryBackup:
      enabled: false
      snapshotVolume: true
      snapshotMoveData: false
      defaultVolumesToFsBackup: false
      schedule: "55 3 * * *"
      ttl: "168h"
    secondaryBackup:
      enabled: false
      schedule: "55 12 * * *"
      snapshotVolume: true
      snapshotMoveData: true
      defaultVolumesToFsBackup: true
      storageLocation: velero-k8s-nl-ams-backup-storage
      ttl: "168h"

hostAliases: []

metrics:
## -- Prometheus is enabled by default.
## It can be disabled by setting "prometheus: null"
  prometheus:
    # -- Deploy metrics service and service monitor
    enabled: true
    # -- Entry point used to expose metrics.
    entryPoint: metrics
    disableAPICheck: true
    serviceMonitor:
      additionalLabels:
        release: kube-prometheus-stack
      jobLabel: linkurious-enterprise
      interval: 30s
      honorLabels: true

## -- Allow only whitelisted ip or cidr
## https://doc.traefik.io/traefik/middlewares/http/ipwhitelist/
ipAllowList: {}
# sourceRange:
#   - 127.0.0.1/32
#   - 192.168.1.7
